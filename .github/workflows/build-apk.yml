name: Build Elyra APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Replace app icons
        run: |
          RES=android/app/src/main/res
          echo "Mipmap folders found:"
          ls $RES | grep mipmap
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            SRC="icons/mipmap-$density"
            DEST="$RES/mipmap-$density"
            if [ -d "$SRC" ] && [ -d "$DEST" ]; then
              cp $SRC/ic_launcher.png       $DEST/ic_launcher.png
              cp $SRC/ic_launcher_round.png $DEST/ic_launcher_round.png
              echo "✅ Replaced mipmap-$density"
            else
              echo "⚠️  Skipped mipmap-$density (src exists: $([ -d $SRC ] && echo yes || echo no), dest exists: $([ -d $DEST ] && echo yes || echo no))"
            fi
          done

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Elyra-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
