name: Build Elyra APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy Elyra icons
        run: |
          RES=android/app/src/main/res
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icons/mipmap-$density/ic_launcher.png       $RES/mipmap-$density/ic_launcher.png
            cp icons/mipmap-$density/ic_launcher_round.png $RES/mipmap-$density/ic_launcher_round.png
          done
          echo "Icons copied!"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Elyra-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
