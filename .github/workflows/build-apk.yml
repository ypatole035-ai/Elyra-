name: Build Elyra APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Setup Node.js 22 (required by Capacitor 8)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3 — Setup Java 17 (required for Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Install Capacitor dependencies
      - name: Install dependencies
        run: npm install

      # 5 — Add Android platform
      - name: Add Capacitor Android platform
        run: npx cap add android

      # 6 — Sync web assets into Android project
      - name: Sync Capacitor
        run: npx cap sync android

      # 7 — Make gradlew executable
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # 8 — Build debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 9 — Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Elyra-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
